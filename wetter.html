  <style>
    /* ── Sunny Day (default) ─────────────────────────────────────────── */
    :root {
      --page:         #fef3d8;
      --row:          #f5dba8;
      --header:       #c4631a;
      --title:        #7a2e08;
      --border:       rgba(180,90,20,0.38);
      --divid:        #c4631a;
      --pri:          #2d1204;
      --sec:          #7a4010;
      --min:          #a06828;
      --accent:       #c8520a;
      --green:        #587020;
      --pill:         #c89010;
      --banner:       #7a2e08;
      --searchbar-bg: #e8b558;

      --card-bg:      linear-gradient(150deg,#fef8e8 0%,#f5dfa8 100%);
      --card-border:  rgba(180,90,20,0.45);
      --card-shadow:  0 3px 14px rgba(100,50,5,0.22), inset 0 1px 0 rgba(255,255,255,0.75);
      --card-shadow-hover: 0 9px 28px rgba(100,50,5,0.38), inset 0 1px 0 rgba(255,255,255,0.90);

      --scroll-bg:    rgba(200,130,30,0.10);
      --scroll-border:rgba(180,90,20,0.28);

      --banner-h: 260px;
      --card-w: 105px; --card-fs: 12px; --card-icon: 30px;
      --card-temp: 17px; --card-pad: 7px 5px;
      --section-pad: 18px 16px 10px;
    }

    /* ── Midnight Groove (dark) ──────────────────────────────────────── */
    [data-theme="dark"] {
      --page:         #1a0803;
      --row:          #2c1405;
      --header:       #4a2008;
      --title:        #1c0a01;
      --border:       rgba(200,110,20,0.28);
      --divid:        #5a2c10;
      --pri:          #f0d898;
      --sec:          #c49038;
      --min:          #8a6035;
      --accent:       #e07828;
      --green:        #88aa28;
      --pill:         #e0a028;
      --banner:       #0c0401;
      --searchbar-bg: #2c1405;

      --card-bg:      linear-gradient(150deg,rgba(44,22,8,0.98) 0%,rgba(30,14,3,0.95) 100%);
      --card-border:  rgba(200,110,25,0.32);
      --card-shadow:  0 3px 14px rgba(0,0,0,0.65), inset 0 1px 0 rgba(200,120,30,0.12);
      --card-shadow-hover: 0 9px 28px rgba(0,0,0,0.85), inset 0 1px 0 rgba(200,120,30,0.22);

      --scroll-bg:    rgba(200,110,25,0.07);
      --scroll-border:rgba(200,110,25,0.18);
    }

    @media (max-width: 600px) {
      :root {
        --banner-h: 180px;
        --card-w: 88px; --card-fs: 11px; --card-icon: 26px;
        --card-temp: 15px; --card-pad: 5px 3px;
        --section-pad: 12px 10px 8px;
      }
    }
    @media (max-width: 380px) {
      :root {
        --banner-h: 140px;
        --card-w: 78px; --card-fs: 10px; --card-icon: 22px;
        --card-temp: 14px; --card-pad: 4px 2px;
        --section-pad: 10px 8px 6px;
      }
    }

    * { box-sizing: border-box; }

    /* ── Groovy background ───────────────────────────────────────────── */
    body {
      margin: 0; padding: 0;
      font-family: 'Nunito', Arial, sans-serif;
      color: var(--pri);
      transition: background .4s, color .4s;
      background:
        radial-gradient(ellipse at 12% 30%, rgba(200,130,20,0.18) 0%, transparent 48%),
        radial-gradient(ellipse at 88% 12%, rgba(180,55,10,0.14) 0%, transparent 48%),
        radial-gradient(ellipse at 65% 82%, rgba(75,115,15,0.11) 0%, transparent 48%),
        radial-gradient(ellipse at 30% 90%, rgba(215,155,25,0.13) 0%, transparent 48%),
        radial-gradient(ellipse at 75% 45%, rgba(190,80,15,0.09) 0%, transparent 48%),
        var(--page);
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* ── Groovy App Header ───────────────────────────────────────────── */
    #groovy-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 14px 20px 10px;
      background: linear-gradient(135deg, var(--title) 0%, var(--header) 50%, #8b6010 100%);
      border-bottom: 3px solid rgba(255,200,50,0.45);
      position: relative;
      overflow: hidden;
    }
    #groovy-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent 0px, transparent 8px,
        rgba(255,200,50,0.06) 8px, rgba(255,200,50,0.06) 10px
      );
      pointer-events: none;
    }
    .groovy-title {
      font-family: 'Righteous', cursive;
      font-size: clamp(18px, 5.5vw, 30px);
      color: #fef0a0;
      text-shadow:
        2px 2px 0 rgba(100,40,0,0.6),
        0 0 24px rgba(255,200,50,0.55);
      letter-spacing: 1.5px;
      white-space: nowrap;
    }
    .peace-icon {
      font-size: clamp(20px, 5vw, 28px);
      display: inline-block;
      animation: peaceSpin 12s linear infinite;
      filter: drop-shadow(0 0 8px rgba(255,200,50,0.7));
    }
    .peace-icon:nth-child(3) { animation-direction: reverse; animation-duration: 16s; }
    @keyframes peaceSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Search bar ─────────────────────────────────────────────────── */
    #search-bar {
      display: flex; gap: 8px; padding: 12px 16px;
      background: var(--searchbar-bg);
      border-bottom: 2px solid var(--border);
      position: sticky; top: 0; z-index: 100; flex-wrap: wrap;
      transition: background .4s;
    }
    #search-bar::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 0; right: 0; height: 6px;
      background: repeating-linear-gradient(
        90deg,
        var(--accent) 0px, var(--accent) 12px,
        var(--pill) 12px, var(--pill) 24px,
        var(--green) 24px, var(--green) 36px
      );
      opacity: 0.55;
    }
    #location-input {
      flex: 1; min-width: 0; padding: 10px 16px;
      background: var(--page); border: 2px solid var(--border);
      border-radius: 30px; color: var(--pri);
      font-family: 'Nunito', sans-serif;
      font-size: clamp(13px,3.5vw,15px); font-weight: 600;
      transition: border-color .2s, box-shadow .2s;
    }
    #location-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,82,10,0.20);
    }
    #location-input::placeholder { color: var(--min); opacity: 0.8; }

    #search-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, var(--accent) 0%, #e07030 100%);
      border: 2px solid rgba(255,150,50,0.40); border-radius: 30px;
      color: #fef8e0; font-family: 'Righteous', cursive;
      font-weight: 400; cursor: pointer;
      font-size: clamp(13px,3.5vw,15px); white-space: nowrap;
      touch-action: manipulation;
      box-shadow: 0 3px 10px rgba(150,50,5,0.35);
      transition: transform .15s, box-shadow .15s;
      letter-spacing: 0.5px;
    }
    #search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(150,50,5,0.50);
    }
    #search-btn:disabled {
      background: var(--border); color: var(--min);
      cursor: default; transform: none; box-shadow: none;
    }

    #locate-btn {
      padding: 10px 14px;
      background: linear-gradient(135deg, #6a8820 0%, #8aaa28 100%);
      border: 2px solid rgba(140,180,40,0.35); border-radius: 30px;
      color: #f8f0c0; cursor: pointer;
      font-size: clamp(13px,3.5vw,15px); white-space: nowrap;
      touch-action: manipulation;
      box-shadow: 0 3px 10px rgba(40,70,5,0.30);
      transition: transform .15s, box-shadow .15s;
    }
    #locate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(40,70,5,0.45);
    }

    #theme-btn {
      padding: 10px 14px;
      background: transparent;
      border: 2px solid var(--border); border-radius: 30px;
      color: var(--pri); cursor: pointer; font-size: 16px;
      line-height: 1; touch-action: manipulation;
      transition: border-color .2s, color .2s, transform .15s;
    }
    #theme-btn:hover {
      border-color: var(--pill); color: var(--pill);
      transform: rotate(20deg);
    }

    #status {
      padding: 16px 20px 0;
      color: var(--sec);
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 600; min-height: 2em;
    }

    /* ── Report layout ──────────────────────────────────────────────── */
    .w-report { background: transparent; width: 100%; }

    .w-banner-wrap {
      width: 100%; height: var(--banner-h); overflow: hidden;
      background: var(--banner); line-height: 0; font-size: 0;
      position: relative;
    }
    .w-banner-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 40%,
        rgba(50,15,0,0.55) 100%
      );
      pointer-events: none;
    }
    .w-banner-wrap img {
      width: 100%; height: var(--banner-h);
      object-fit: cover; object-position: center; display: block;
    }

    .w-banner-fallback {
      width: 100%; height: var(--banner-h);
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #5a1e05 0%, #8b4010 50%, #5a3005 100%);
      font-family: 'Righteous', cursive;
      font-size: clamp(16px,5vw,24px); color: #fef0a0;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    }

    .w-titlebar {
      background: linear-gradient(135deg, var(--title) 0%, var(--header) 100%);
      padding: 14px 18px;
      border-bottom: 2px solid rgba(255,200,50,0.30);
      position: relative;
      overflow: hidden;
    }
    .w-titlebar::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent 0px, transparent 10px,
        rgba(255,200,50,0.05) 10px, rgba(255,200,50,0.05) 12px
      );
      pointer-events: none;
    }
    .w-titlebar-name {
      font-family: 'Righteous', cursive;
      color: #fef0a0;
      font-size: clamp(15px,4.5vw,22px);
      text-shadow: 1px 1px 0 rgba(0,0,0,0.45), 0 0 16px rgba(255,200,50,0.35);
      letter-spacing: 0.5px;
    }
    .w-titlebar-meta {
      color: rgba(255,220,140,0.80);
      font-size: clamp(10px,2.5vw,11px); margin-top: 4px;
      font-weight: 600;
    }

    .w-section { padding: var(--section-pad); background: transparent; }
    .w-section-last { padding: 10px 16px 24px; background: transparent; }
    .w-section .w-scroll,
    .w-section-last .w-scroll { margin: 0 -16px; border-radius: 0; border-left: none; border-right: none; }

    /* ── Section headings ───────────────────────────────────────────── */
    .w-sh {
      font-family: 'Righteous', cursive;
      font-size: clamp(14px,4vw,17px);
      color: var(--accent);
      padding-bottom: 8px; margin-bottom: 6px;
      position: relative;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.12);
    }
    .w-sh::after {
      content: '';
      display: block;
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--pill) 50%, var(--green) 100%);
      border-radius: 2px;
      opacity: 0.70;
    }
    .w-sh2 {
      font-size: 10px; color: var(--min); margin-bottom: 6px;
      font-weight: 600;
    }

    /* ── Footer ─────────────────────────────────────────────────────── */
    .w-footer {
      background: linear-gradient(135deg, var(--title) 0%, var(--header) 100%);
      padding: 10px 16px;
      border-top: 2px solid rgba(255,200,50,0.28);
      font-family: 'Nunito', sans-serif;
      font-size: 11px; color: rgba(255,210,120,0.75);
      text-align: center; letter-spacing: 0.3px;
    }
    .w-footer a { color: #ffd060; text-decoration: none; }
    .w-footer a:hover { text-decoration: underline; }

    /* ── Pills (day/week labels) ─────────────────────────────────────── */
    .w-pill {
      display: inline-block;
      font-family: 'Righteous', cursive;
      font-size: 12px;
      color: #fef0a0;
      background: linear-gradient(135deg, var(--accent) 0%, var(--pill) 100%);
      border-radius: 20px;
      padding: 4px 14px;
      margin-top: 10px; margin-bottom: 5px;
      box-shadow: 0 2px 8px rgba(100,40,5,0.30);
      letter-spacing: 0.4px;
    }

    /* ── Scroll row ─────────────────────────────────────────────────── */
    .w-scroll {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      border-radius: 14px; padding: 7px;
      background: var(--scroll-bg);
      border: 1.5px solid var(--scroll-border);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .w-scroll table {
      border-collapse: separate; border-spacing: 5px;
      width: 100%; min-width: max-content;
    }

    /* ── Cards — warm earthy style ──────────────────────────────────── */
    .wc {
      padding: var(--card-pad); text-align: center; vertical-align: top;
      min-width: var(--card-w); font-size: var(--card-fs);
      font-family: 'Nunito', sans-serif;
      white-space: normal;
      border-radius: 18px;
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      box-shadow: var(--card-shadow);
      transition: transform .18s ease, box-shadow .18s ease;
      position: relative;
      overflow: hidden;
    }
    .wc::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--pill), var(--green));
      opacity: 0.60;
    }
    .wc:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: var(--card-shadow-hover);
    }
    .wc-time  { color: var(--pri); font-size: calc(var(--card-fs) + 1px); font-weight: 800; }
    .wc-date  { color: var(--pri); font-size: calc(var(--card-fs) - 1px); font-weight: 800; }
    .wc-icon  { font-size: var(--card-icon); margin: 4px 0; }
    .wc-desc  { font-size: calc(var(--card-fs) - 2px); color: var(--sec); line-height: 1.2; font-weight: 600; }
    .wc-temp  { font-size: var(--card-temp); font-weight: 800; color: var(--accent); margin-top: 3px; }
    .wc-tmin  { font-size: calc(var(--card-fs) - 1px); color: var(--min); font-weight: 600; }
    .wc-prec  { font-size: calc(var(--card-fs) - 2px); color: var(--pill); margin-top: 2px; font-weight: 700; }
    .wc-arrow { font-size: calc(var(--card-fs) + 3px); color: var(--accent); }
    .wc-dir   { font-size: calc(var(--card-fs) - 2px); color: var(--accent); font-weight: 800; }
    .wc-wind  { font-size: calc(var(--card-fs) - 2px); color: var(--green); font-weight: 700; }

    /* ── Scrollbar groovy styling ────────────────────────────────────── */
    .w-scroll::-webkit-scrollbar { height: 6px; }
    .w-scroll::-webkit-scrollbar-track { background: transparent; }
    .w-scroll::-webkit-scrollbar-thumb {
      background: linear-gradient(90deg, var(--accent), var(--pill));
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div id="groovy-header">
  <span class="peace-icon">☮</span>
  <span class="groovy-title">Wetter Vorschau</span>
  <span class="peace-icon">🌻</span>
</div>

<div id="search-bar">
  <input id="location-input" type="text" placeholder="🌍 Ort – z.B. München, Wien, Zürich …" autocomplete="off" />
  <button id="locate-btn" onclick="autoDetectLocation()" title="Meinen Standort verwenden">📍</button>
  <button id="search-btn" onclick="startSearch()">✌ Suchen</button>
  <button id="theme-btn" onclick="toggleTheme()" title="Hell/Dunkel wechseln">🌙</button>
</div>
<div id="status"></div>
<div id="report"></div>

<script>
// Colors referenced only for the gradient fallback banner (CSS vars cover the rest)
const C = {
  pri: "#2d1204", sec: "#7a4010", min: "#a06828",
  accent: "#c8520a", green: "#587020", pill: "#c89010",
};
// Banner height mirrors the CSS --banner-h variable, responsive


// ── WMO codes (German) ───────────────────────────────────────────────────────
const WMO = {
  0:  ["Klarer Himmel",         "☀️"],
  1:  ["Überwiegend klar",      "🌤️"],
  2:  ["Teilweise bewölkt",     "⛅"],
  3:  ["Bedeckt",               "☁️"],
  45: ["Nebel",                 "🌫️"],
  48: ["Gefrierender Nebel",    "🌫️"],
  51: ["Leichter Nieselregen",  "🌦️"],
  53: ["Nieselregen",           "🌦️"],
  55: ["Starker Nieselregen",   "🌧️"],
  61: ["Leichter Regen",        "🌧️"],
  63: ["Regen",                 "🌧️"],
  65: ["Starker Regen",         "🌧️"],
  71: ["Leichter Schneefall",   "🌨️"],
  73: ["Schneefall",            "❄️"],
  75: ["Starker Schneefall",    "❄️"],
  77: ["Schneekörner",          "🌨️"],
  80: ["Leichte Schauer",       "🌦️"],
  81: ["Schauer",               "🌦️"],
  82: ["Heftige Schauer",       "⛈️"],
  85: ["Leichte Schneeschauer", "🌨️"],
  86: ["Starke Schneeschauer",  "❄️"],
  95: ["Gewitter",              "⛈️"],
  96: ["Gewitter mit Hagel",    "⛈️"],
  99: ["Gewitter mit Hagel",    "⛈️"],
};
const wmoLabel = code => WMO[code] ?? ["Unbekannt", "🌡️"];

// ── German date helpers ───────────────────────────────────────────────────────
const DE_WD = ["Mo","Di","Mi","Do","Fr","Sa","So"];
const DE_MO = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
function fmtDe(s) {
  // Parse as local date to avoid UTC offset shifting the day
  const [y, m, d] = s.split("-").map(Number);
  const date = new Date(y, m - 1, d);
  const dayIdx = (date.getDay() + 6) % 7; // Mon=0 … Sun=6
  return `${DE_WD[dayIdx]} ${date.getDate()}. ${DE_MO[date.getMonth()]}`;
}

// ── Wind helpers ──────────────────────────────────────────────────────────────
const COMPASS = ["N","NNO","NO","ONO","O","OSO","SO","SSO","S","SSW","SW","WSW","W","WNW","NW","NNW"];
const ARROWS8 = ["↑","↗","→","↘","↓","↙","←","↖"];
const degToCompass = d => COMPASS[Math.round(d / 22.5) % 16];
const degToArrow   = d => ARROWS8[Math.round(((d + 180) % 360) / 45) % 8];

// ── Card fragments ────────────────────────────────────────────────────────────
function precipHtml(prob, amt) {
  const parts = [];
  if (prob != null) parts.push(`${Math.round(prob)}%`);
  if (amt  != null && amt > 0) parts.push(`${amt.toFixed(1)}mm`);
  return parts.length ? `<div class="wc-prec">💧 ${parts.join(" · ")}</div>` : "";
}

function cardHourly(ts, temp, code, ws, wg, wd, prob, prec) {
  const [desc, ico] = wmoLabel(code);
  const hour = ts.length > 10 ? ts.slice(11, 16) : ts;
  return `<td class="wc">
    <b class="wc-time">${hour}</b>
    <div class="wc-icon">${ico}</div>
    <div class="wc-desc">${desc}</div>
    <div class="wc-temp">${Math.round(temp)}°C</div>
    ${precipHtml(prob, prec)}
    <div class="wc-arrow">${degToArrow(wd)}</div>
    <div class="wc-dir">${degToCompass(wd)} ±15°</div>
    <div class="wc-wind">${Math.round(ws)}–${Math.round(wg)}&nbsp;km/h</div>
  </td>`;
}

function cardDaily(dateStr, tmax, tmin, code, ws, wg, wd, prob, prec) {
  const [desc, ico] = wmoLabel(code);
  return `<td class="wc">
    <b class="wc-date">${fmtDe(dateStr)}</b>
    <div class="wc-icon">${ico}</div>
    <div class="wc-desc">${desc}</div>
    <div class="wc-temp">${Math.round(tmax)}°C</div>
    <div class="wc-tmin">↓${Math.round(tmin)}°C</div>
    ${precipHtml(prob, prec)}
    <div class="wc-arrow">${degToArrow(wd)}</div>
    <div class="wc-dir">${degToCompass(wd)} ±15°</div>
    <div class="wc-wind">${Math.round(ws)}–${Math.round(wg)}&nbsp;km/h</div>
  </td>`;
}

const dayPill  = dateStr => `<div class="w-pill">📅 ${fmtDe(dateStr)}</div>`;
const weekPill = label   => `<div class="w-pill">🗓 ${label}</div>`;
const scrollRow = tds    => `<div class="w-scroll">
  <table cellpadding="0" cellspacing="4"><tr>${tds.join("")}</tr></table></div>`;

// ── Section heading helpers ───────────────────────────────────────────────────
const sh  = txt => `<div class="w-sh">${txt}</div>`;
const sh2 = txt => `<div class="w-sh2">${txt}</div>`;

// ── Banner photo — Wikipedia JPG images (cities, landmarks, streets, quarters) ─
const SKIP_RE = /flag|wappen|coat|logo|map|karte|seal|emblem|symbol|locator|relief|portrait|politician|icon|pictogram|badge/i;
const VIEW_RE = /panorama|skyline|cityscape|stadtansicht|stadtbild|overview|aerial|innenstadt|altstadt|view|aussicht|ansicht|blick|landmark|sehenswürdigkeit|straße|street|gasse|platz|square|viertel|quarter|district|neighbourhood|stadtteil/i;
// Plain name first — crucial for small villages that have no "panorama" files
const COMMONS_QUERIES = (loc) => [
  loc, `${loc} panorama`, `${loc} view`, `${loc} photo`,
  `${loc} cityscape`, `${loc} landmark`, `${loc} street`,
];

// Fisher-Yates shuffle — returns a new shuffled array
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// One pageimages thumbnail — filtered, sized, reliable (no second request needed)
async function wikiPageImage(lang, title) {
  const url = `https://${lang}.wikipedia.org/w/api.php?action=query`
    + `&titles=${encodeURIComponent(title)}`
    + `&prop=pageimages&piprop=thumbnail&pithumbsize=1400`
    + `&format=json&redirects=1&origin=*`;
  const res  = await fetch(url);
  const data = await res.json();
  for (const page of Object.values(data?.query?.pages ?? {})) {
    if ((page.pageid ?? -1) < 0) continue;
    const src = page?.thumbnail?.source;
    // Reject SVGs, flags, coats-of-arms etc.
    if (src && /\.(jpg|jpeg|png)/i.test(src) && !SKIP_RE.test(src)) return src;
  }
  return null;
}

// Fetch imageinfo for a single file title
async function wikiFileUrl(wiki, fileTitle) {
  const url = `https://${wiki}/w/api.php?action=query`
    + `&titles=${encodeURIComponent(fileTitle)}`
    + `&prop=imageinfo&iiprop=url&iiurlwidth=1400&format=json&origin=*`;
  const res   = await fetch(url);
  const data  = await res.json();
  for (const pg of Object.values(data?.query?.pages ?? {})) {
    const ii  = pg?.imageinfo?.[0];
    const src = ii?.thumburl || ii?.url;
    if (src) return src;
  }
  return null;
}


async function fetchBannerPhoto(locationName) {
  const city    = locationName.split(",")[0].trim();
  const queries = city === locationName ? [city] : [city, locationName];

  // 1. Wikipedia pageimages — en first (better photos), then de
  for (const q of queries) {
    for (const lang of ["en", "de"]) {
      try {
        const src = await wikiPageImage(lang, q);
        if (src) { console.log(`Banner wiki/${lang}:`, src); return src; }
      } catch {}
    }
  }

  // 2. Wikimedia Commons search
  for (const q of queries) {
    for (const searchQ of COMMONS_QUERIES(q)) {
      try {
        const sp  = `https://commons.wikimedia.org/w/api.php?action=query&list=search`
          + `&srsearch=${encodeURIComponent(searchQ)}&srnamespace=6&srlimit=10&format=json&origin=*`;
        const res = await fetch(sp);
        const hits = (await res.json())?.query?.search ?? [];
        for (const hit of hits.filter(h => /\.(jpg|jpeg)$/i.test(h.title) && !SKIP_RE.test(h.title)).slice(0, 4)) {
          try {
            const src = await wikiFileUrl("commons.wikimedia.org", hit.title);
            if (src) { console.log("Banner commons:", src); return src; }
          } catch {}
        }
      } catch {}
    }
  }

  console.warn("No banner found for:", locationName);
  return null;
}

// ── Geocoding — Open-Meteo first, Nominatim fallback ─────────────────────────
async function geocode(location) {
  // 1. Open-Meteo (good for cities/towns)
  try {
    const p = new URLSearchParams({ name: location, count: 1, language: "de", format: "json" });
    const res  = await fetch(`https://geocoding-api.open-meteo.com/v1/search?${p}`);
    const data = await res.json();
    const r = data?.results?.[0];
    if (r) {
      const name = [r.name, r.admin1, r.country].filter(Boolean).join(", ");
      return { lat: r.latitude, lon: r.longitude, name };
    }
  } catch { /* fall through to Nominatim */ }

  // 2. Nominatim/OSM — handles landmarks, streets, quarters, POIs
  const p = new URLSearchParams({ q: location, format: "json", limit: 1, "accept-language": "de" });
  const res  = await fetch(`https://nominatim.openstreetmap.org/search?${p}`,
    { headers: { "User-Agent": "WetterVorschau/1.0" } });
  const data = await res.json();
  const r = data?.[0];
  if (!r) throw new Error(`Ort nicht gefunden: ${location}`);
  const name = r.display_name.split(",").slice(0, 3).join(", ");
  return { lat: parseFloat(r.lat), lon: parseFloat(r.lon), name };
}

// ── Weather fetch ─────────────────────────────────────────────────────────────
async function fetchWeather(lat, lon) {
  const p = new URLSearchParams({
    latitude: lat, longitude: lon,
    hourly: [
      "temperature_2m","weathercode","windspeed_10m",
      "windgusts_10m","winddirection_10m","precipitation","precipitation_probability",
    ].join(","),
    daily: [
      "weathercode","temperature_2m_max","temperature_2m_min",
      "windspeed_10m_max","windgusts_10m_max","winddirection_10m_dominant",
      "precipitation_sum","precipitation_probability_max",
    ].join(","),
    timezone: "auto", forecast_days: 14,
    wind_speed_unit: "kmh", temperature_unit: "celsius",
  });
  const res = await fetch(`https://api.open-meteo.com/v1/forecast?${p}`);
  if (!res.ok) throw new Error(`Wetter-API Fehler: ${res.status}`);
  return res.json();
}

// ── HTML report ───────────────────────────────────────────────────────────────
function buildReport(loc, weather, generatedAt, bannerSrc) {
  const h  = weather.hourly ?? {};
  const d  = weather.daily  ?? {};
  const tz = weather.timezone ?? "UTC";

  const times   = h.time                      ?? [];
  const temps   = h.temperature_2m            ?? [];
  const codes_h = h.weathercode               ?? [];
  const ws_h    = h.windspeed_10m             ?? [];
  const wg_h    = h.windgusts_10m             ?? [];
  const wd_h    = h.winddirection_10m         ?? [];
  const prob_h  = h.precipitation_probability ?? [];
  const prec_h  = h.precipitation             ?? [];

  // 72 h – group every 3rd entry by day
  const days72h = {};
  for (let i = 0; i < Math.min(73, times.length); i += 3) {
    const ts = times[i], dk = ts.slice(0, 10);
    (days72h[dk] ??= []).push(cardHourly(
      ts,
      temps[i]   ?? 0, parseInt(codes_h[i] ?? 0),
      ws_h[i]    ?? 0, wg_h[i]   ?? 0, wd_h[i]   ?? 0,
      prob_h[i]  ?? null, prec_h[i] ?? null,
    ));
  }
  const hourlyHtml = Object.entries(days72h).slice(0, 3)
    .map(([dk, tds]) => dayPill(dk) + scrollRow(tds)).join("");

  // 14-day
  const dd   = d.time                          ?? [];
  const dc   = d.weathercode                   ?? [];
  const dmax = d.temperature_2m_max            ?? [];
  const dmin = d.temperature_2m_min            ?? [];
  const dws  = d.windspeed_10m_max             ?? [];
  const dwg  = d.windgusts_10m_max             ?? [];
  const dwd  = d.winddirection_10m_dominant    ?? [];
  const dpb  = d.precipitation_probability_max ?? [];
  const dpc  = d.precipitation_sum             ?? [];

  const allDaily = Array.from({ length: Math.min(14, dd.length) }, (_, i) =>
    cardDaily(
      dd[i],
      dmax[i] ?? 0, dmin[i] ?? 0, parseInt(dc[i] ?? 0),
      dws[i]  ?? 0, dwg[i]  ?? 0, dwd[i]  ?? 0,
      dpb[i]  ?? null, dpc[i] ?? null,
    )
  );

  let dailyHtml = "";
  for (let ci = 0; ci < 2; ci++) {
    const start = ci * 7;
    const chunk = allDaily.slice(start, start + 7);
    if (!chunk.length) break;
    const w1 = dd[start]                          ? fmtDe(dd[start])                          : "";
    const w2 = dd[Math.min(start + 6, dd.length - 1)] ? fmtDe(dd[Math.min(start + 6, dd.length - 1)]) : "";
    dailyHtml += weekPill(`Woche ${ci + 1}: ${w1} – ${w2}`) + scrollRow(chunk);
  }

  const bannerHtml = bannerSrc
    ? `<div class="w-banner-wrap"><img src="${bannerSrc}" alt="${loc.name}"></div>`
    : `<div class="w-banner-fallback">🌻 ${loc.name} 🌻</div>`;

  return `
<div class="w-report">
  ${bannerHtml}
  <div class="w-titlebar">
    <div class="w-titlebar-name">☮ Wetterbericht: ${loc.name}</div>
    <div class="w-titlebar-meta">
      ${loc.lat.toFixed(4)}°N, ${loc.lon.toFixed(4)}°O &nbsp;·&nbsp;
      Zeitzone: ${tz} &nbsp;·&nbsp; Stand: ${generatedAt}
    </div>
  </div>
  <div class="w-section">
    ${sh(`⏱ 72-Stunden-Vorhersage <span style="font-size:11px;font-weight:normal;color:var(--sec);">(3h-Intervalle, ein Tag pro Zeile)</span>`)}
    ${sh2(`Windrichtung ±15° Modellstreuung &nbsp;·&nbsp; Windstärke: mittlere – Böen (km/h) &nbsp;·&nbsp; 💧 Niederschlagswahrscheinlichkeit &amp; -menge`)}
    ${hourlyHtml}
  </div>
  <div class="w-section-last">
    ${sh(`📅 14-Tage-Vorhersage <span style="font-size:11px;font-weight:normal;color:var(--sec);">(täglich, eine Woche pro Zeile)</span>`)}
    ${sh2(`Windrichtung ±15° Modellstreuung &nbsp;·&nbsp; Max. Windstärke: mittlere – Böen (km/h) &nbsp;·&nbsp; 💧 Niederschlag täglich`)}
    ${dailyHtml}
  </div>
  <div class="w-footer">
    🌻 Wetterdaten: <a href="https://open-meteo.com/">Open-Meteo</a>
    &nbsp;·&nbsp; Windrichtungsungenauigkeit: ±15° Modellstreuung &nbsp;·&nbsp; ☮ Peace &amp; Love
  </div>
</div>`;
}

// ── Main search flow ──────────────────────────────────────────────────────────
async function startSearch() {
  const input  = document.getElementById("location-input");
  const status = document.getElementById("status");
  const report = document.getElementById("report");
  const btn    = document.getElementById("search-btn");
  const location = input.value.trim();
  if (!location) return;

  btn.disabled = true;
  report.innerHTML = "";

  try {
    status.textContent = "🔍 Suche Standort…";
    const loc = await geocode(location);

    status.textContent = `📡 Lade Wetterdaten für ${loc.name}…`;
    const [weather, bannerSrc] = await Promise.all([
      fetchWeather(loc.lat, loc.lon),
      fetchBannerPhoto(loc.name),
    ]);

    const now = new Date();
    const generatedAt = now.toLocaleString("de-DE", {
      day: "2-digit", month: "2-digit", year: "numeric",
      hour: "2-digit", minute: "2-digit", timeZoneName: "short",
    });

    status.textContent = "";
    report.innerHTML = buildReport(loc, weather, generatedAt, bannerSrc);
  } catch (err) {
    status.textContent = `❌ Fehler: ${err.message}`;
  } finally {
    btn.disabled = false;
  }
}

// Allow Enter key in the search field
document.getElementById("location-input").addEventListener("keydown", e => {
  if (e.key === "Enter") startSearch();
});

// ── Theme toggle ─────────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  document.getElementById("theme-btn").textContent = theme === "dark" ? "☀️" : "🌙";
}
function toggleTheme() {
  const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  localStorage.setItem("wetter-theme", next);
  applyTheme(next);
}
(function () {
  const saved = localStorage.getItem("wetter-theme")
    || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  applyTheme(saved);
})();

// ── Auto-start: browser geolocation → reverse geocode, fallback to Shanghai ──
async function reverseGeocode(lat, lon) {
  const p = new URLSearchParams({ lat, lon, format: "json", "accept-language": "de", zoom: 10 });
  const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?${p}`,
    { headers: { "User-Agent": "WetterVorschau/1.0" } });
  const data = await res.json();
  // Prefer city/town/village/suburb, fall back to first 3 parts of display_name
  const a = data?.address ?? {};
  const name = a.city || a.town || a.village || a.suburb || a.county
    || data?.display_name?.split(",").slice(0, 2).join(", ")
    || "Shanghai";
  return name;
}

async function autoDetectLocation() {
  const input  = document.getElementById("location-input");
  const status = document.getElementById("status");

  if (!navigator.geolocation) {
    input.value = "Shanghai";
    startSearch();
    return;
  }

  status.textContent = "📍 Ermittle Standort…";
  navigator.geolocation.getCurrentPosition(
    async pos => {
      try {
        const name = await reverseGeocode(pos.coords.latitude, pos.coords.longitude);
        input.value = name;
      } catch {
        input.value = "Shanghai";
      }
      startSearch();
    },
    () => {
      // Denied or unavailable
      input.value = "Shanghai";
      startSearch();
    },
    { timeout: 8000 }
  );
}

autoDetectLocation();
</script>
